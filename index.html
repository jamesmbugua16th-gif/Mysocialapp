<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<title>My Social App</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    margin: 0;
    padding: 20px;
  }

  h1 {
    text-align: center;
  }

  .container {
    max-width: 500px;
    margin: auto;
  }

  input {
    width: 48%;
    padding: 10px;
    margin: 5px 1%;
    border-radius: 8px;
    border: 1px solid #ccc;
  }

  button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #1877f2;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #145dbf;
  }

  .post {
    background: white;
    padding: 15px;
    margin-top: 10px;
    border-radius: 12px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .actions button {
    margin-right: 10px;
    background: #eee;
    color: black;
  }

  .actions button:hover {
    background: #ddd;
  }
  </style>
</head>
<body>
<div class="container">

  <h1>Welcome to My Social App 🚀</h1>
  <p>Firebase connected soon...</p>
  <button onclick="login()">Login with Google</button>
<button onclick="logout()">Logout</button>
<p id="userInfo">Not logged in</p>
  <input id="username" placeholder="Your name..." />
<input id="postInput" placeholder="Write something..." />
<button onclick="addPost()">Save Post</button>
  <!-- Firebase script -->
  <h2>Posts</h2>
<div id="posts"></div>

<script type="module">
import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc, 
  deleteDoc,
  increment,
  getDoc,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import {
  getAuth,
  signInWithRedirect,
  getRedirectResult,
  signOut,
  onAuthStateChanged,
  GoogleAuthProvider
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
const firebaseConfig = {
  apiKey: "AIzaSyDOyT7rKTgOwNf-aJ-1BHOris2R_tD6iyc",
  authDomain: "mysocialapp-kenya.firebaseapp.com",
  projectId: "mysocialapp-kenya",
  storageBucket: "mysocialapp-kenya.firebasestorage.app",
  messagingSenderId: "58939051686",
  appId: "1:58939051686:web:412641f2a56b3cb176ae67"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
let currentUser = null;
getRedirectResult(auth)
  .then((result) => {
    if (result?.user) {
      currentUser = result.user;

      document.getElementById("userInfo").innerText =
        "Logged in as: " + result.user.displayName;
    }
  })
  .catch((error) => {
    console.error(error);
  });

window.login = async function () {
  try {
    await signInWithRedirect(auth, provider);
  } catch (error) {
    console.error(error);
  }
};

window.logout = async function () {
  await signOut(auth);
};

onAuthStateChanged(auth, (user) => {
  const userInfo = document.getElementById("userInfo");

  if (user) {
    currentUser = user;
    userInfo.innerText = "Logged in as: " + user.displayName;
  } else {
    currentUser = null;
    userInfo.innerText = "Not logged in";
  }
});

async function addPost() {
  try {
    const input = document.getElementById("postInput");
    const username = document.getElementById("username");
localStorage.setItem("username", username.value);

    if (input.value.trim() === "") {
      alert("Write something first!");
      return;
    }

    await addDoc(collection(db, "posts"), {
  message: input.value,
  username: currentUser ? currentUser.displayName : "Anonymous",
  uid: currentUser ? currentUser.uid : null,
  time: Date.now(),
  likes: 0
});

    input.value = "";

  } catch (e) {
    console.error(e);
    alert("Error saving post");
  }
}
function timeAgo(timestamp) {
  const now = Date.now();
  const seconds = Math.floor((now - timestamp) / 1000);

  if (seconds < 60) return "Just now";
  if (seconds < 3600) return Math.floor(seconds / 60) + " mins ago";
  if (seconds < 86400) return Math.floor(seconds / 3600) + " hours ago";
  return Math.floor(seconds / 86400) + " days ago";
}

  function loadPosts() {
  const postsDiv = document.getElementById("posts");
  const currentUserName = localStorage.getItem("username") || "Anonymous";
onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (snapshot) => {
  const postsDiv = document.getElementById("posts");
  postsDiv.innerHTML = "";

  snapshot.forEach((docSnap) => {
    const data = docSnap.data();
    const id = docSnap.id;

    const postEl = document.createElement("div");
    postEl.className = "post";

    postEl.innerHTML = `
      <strong>${data.username || data.user || "Anonymous"}</strong>
      <small>${
  data.time?.seconds
    ? timeAgo(data.time.seconds * 1000)
    : timeAgo(data.time)
}</small>
      <p>${data.message}</p>

      ❤️ ${data.likes || 0}
      <button onclick="likePost('${id}')">Like</button>

      ${
        currentUser && data.uid === currentUser.uid
          ? `
        <div class="actions">
          <button onclick="editPost('${id}', '${data.message}')">Edit</button>
          <button onclick="deletePost('${id}')">Delete</button>
        </div>
      `
          : ""
      }
    `;

    postsDiv.appendChild(postEl);
  });
});
}

    console.log("Firebase connected!");
    async function likePost(id) {
  const postRef = doc(db, "posts", id);
  await updateDoc(postRef, {
    likes: increment(1)
  });
}

async function deletePost(id) {
  await deleteDoc(doc(db, "posts", id));
}
async function editPost(id, oldMessage) {
  const newMessage = prompt("Edit your post:", oldMessage);

  if (!newMessage || newMessage.trim() === "") return;

  const postRef = doc(db, "posts", id);

  await updateDoc(postRef, {
    message: newMessage
  });
}

setInterval(() => {
  const times = document.querySelectorAll(".time");

  times.forEach(el => {
    const seconds = el.getAttribute("data-time");
    const date = new Date(seconds * 1000);
    el.innerText = timeAgo(date);
  });
}, 60000);
const savedName = localStorage.getItem("username");
if (savedName) {
  document.getElementById("username").value = savedName;
}
loadPosts();

window.likePost = likePost;
window.deletePost = deletePost;
window.addPost = addPost;
window.editPost = editPost;

window.login = login;
window.logout = logout;
  </script>

</body>
</html>
